<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracer Study Alumni</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 font-sans">

<!-- LOGIN PAGE -->

<div id="loginPage" class="flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-lg shadow-md w-96">

<h1 class="text-2xl font-bold mb-4 text-center">
Tracer Study Admin
</h1>

<input id="username"
placeholder="Username"
class="w-full p-2 border mb-3 rounded"
/>

<input id="password"
type="password"
placeholder="Password"
class="w-full p-2 border mb-3 rounded"
/>

<button onclick="login()"
class="w-full bg-blue-600 text-white p-2 rounded">
Login
</button>

</div>
</div>


<!-- DASHBOARD -->

<div id="dashboardPage" class="hidden p-6">

<h1 class="text-2xl font-bold mb-4">
Dashboard Alumni
</h1>

<div class="grid grid-cols-3 gap-4 mb-6">

<div class="bg-white p-4 shadow rounded">
<h2>Total Alumni</h2>
<p id="totalAlumni" class="text-2xl font-bold">0</p>
</div>

<div class="bg-white p-4 shadow rounded">
<h2>Identified</h2>
<p id="identifiedAlumni" class="text-2xl font-bold text-green-600">0</p>
</div>

<div class="bg-white p-4 shadow rounded">
<h2>Pending</h2>
<p id="pendingAlumni" class="text-2xl font-bold text-yellow-600">0</p>
</div>

</div>


<!-- ADD ALUMNI -->

<div class="bg-white p-4 rounded shadow mb-6">

<h2 class="font-bold mb-2">Add Alumni</h2>

<input id="name" placeholder="Name" class="border p-2 mr-2">
<input id="nim" placeholder="NIM" class="border p-2 mr-2">
<input id="program" placeholder="Program" class="border p-2 mr-2">
<input id="year" placeholder="Year" class="border p-2 mr-2">

<button onclick="addAlumni()"
class="bg-green-600 text-white p-2 rounded">
Add
</button>

</div>


<!-- ALUMNI TABLE -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-2">Alumni List</h2>

<table class="w-full">

<thead>
<tr class="border-b">

<th>Name</th>
<th>NIM</th>
<th>Program</th>
<th>Year</th>
<th>Status</th>
<th>Score</th>
<th>Action</th>

</tr>
</thead>

<tbody id="alumniTable"></tbody>

</table>

</div>

</div>


<script type="module" src="./js/app.js"></script>

</body>
</html>
