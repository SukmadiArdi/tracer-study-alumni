<!doctype html>
<html lang="en" class="h-full">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alumni Tracer Study System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:#f7f9fc;
}

.table-row-hover:hover{
background:#f0f4fa;
}

.sidebar-link:hover{
background:rgba(255,255,255,.12);
}

.sidebar-link.active{
background:rgba(255,255,255,.18);
border-left:3px solid #fff;
}

</style>

</head>


<body class="h-full overflow-hidden">


<!-- LOGIN PAGE -->

<div id="page-login" class="h-full flex items-center justify-center bg-slate-100">

<div class="bg-white p-10 rounded-xl shadow w-96">

<h1 class="text-2xl font-bold mb-6 text-center">
Alumni Tracer Study
</h1>

<input id="login-user"
placeholder="Username"
class="w-full border p-3 rounded mb-3">

<input id="login-pass"
type="password"
placeholder="Password"
class="w-full border p-3 rounded mb-4">

<button id="btn-login"
class="w-full bg-blue-600 text-white p-3 rounded">
Sign In
</button>

</div>

</div>



<!-- DASHBOARD -->

<div id="app-shell" class="hidden h-full">

<div class="flex h-full">


<!-- SIDEBAR -->

<aside class="w-64 bg-blue-900 text-white flex flex-col">

<div class="p-5 border-b border-white/10 font-bold">
Tracer Study
</div>

<nav class="flex-1 p-3 space-y-1">

<button onclick="showPage('dashboard')"
class="sidebar-link active w-full text-left px-3 py-2 rounded"
data-nav="dashboard">
Dashboard
</button>

<button onclick="showPage('alumni')"
class="sidebar-link w-full text-left px-3 py-2 rounded"
data-nav="alumni">
Alumni Management
</button>

<button onclick="showPage('verification')"
class="sidebar-link w-full text-left px-3 py-2 rounded"
data-nav="verification">
Manual Verification
</button>

</nav>

<div class="p-4 border-t border-white/10">

<button onclick="logout()">Logout</button>

</div>

</aside>



<!-- MAIN -->

<main class="flex-1 overflow-auto">


<header class="bg-white border-b p-4">

<h2 id="page-title" class="font-bold text-lg">
Dashboard
</h2>

</header>



<!-- DASHBOARD PAGE -->

<section id="page-dashboard" class="p-6">

<h3 class="font-semibold mb-3">
System Overview
</h3>

<p class="text-gray-500">
Alumni tracking statistics dashboard.
</p>

</section>



<!-- ALUMNI PAGE -->

<section id="page-alumni" class="p-6 hidden">


<div class="flex justify-between mb-4">

<button onclick="openModal()"
class="bg-blue-600 text-white px-4 py-2 rounded">
Add Alumni
</button>

</div>


<table class="w-full text-sm bg-white rounded shadow">

<thead class="bg-gray-100">

<tr>

<th class="p-3 text-left">Name</th>
<th class="p-3 text-left">NIM</th>
<th class="p-3 text-left">Program</th>
<th class="p-3 text-left">Year</th>
<th class="p-3 text-left">Status</th>
<th class="p-3 text-left">Confidence</th>
<th class="p-3 text-right">Action</th>

</tr>

</thead>

<tbody id="alumni-table-body">

</tbody>

</table>

</section>



<!-- VERIFICATION -->

<section id="page-verification" class="p-6 hidden">

<div id="verification-list"></div>

</section>

</main>

</div>

</div>



<!-- ADD MODAL -->

<div id="modal-add"
class="fixed inset-0 hidden items-center justify-center bg-black/40">

<div class="bg-white p-6 rounded-xl w-96">

<h3 class="font-semibold mb-4">
Add Alumni
</h3>

<input id="add-name"
placeholder="Name"
class="border p-2 w-full mb-2">

<input id="add-nim"
placeholder="NIM"
class="border p-2 w-full mb-2">

<input id="add-program"
placeholder="Program"
class="border p-2 w-full mb-2">

<input id="add-year"
placeholder="Year"
class="border p-2 w-full mb-4">


<div class="flex justify-end gap-2">

<button onclick="closeModal()">Cancel</button>

<button onclick="saveAlumni()"
class="bg-blue-600 text-white px-3 py-2 rounded">
Save
</button>

</div>

</div>

</div>



<script type="module">

import { getAlumni, addAlumniDB, deleteAlumniDB, updateAlumniDB } from "./js/database.js";
import { calculateScore, getStatus } from "./js/tracking.js";

let alumniData = [];


/* LOAD DATA FROM FIREBASE */

async function init(){

alumniData = await getAlumni();

renderAlumniTable();

renderVerification();

}

init();


/* SAVE ALUMNI */

window.saveAlumni = async function(){

const name=document.getElementById("add-name").value;
const nim=document.getElementById("add-nim").value;
const program=document.getElementById("add-program").value;
const year=document.getElementById("add-year").value;

await addAlumniDB({

name,
nim,
program,
year,
status:"Pending",
confidence:0

});

location.reload();

}


/* DELETE */

window.confirmDelete = async function(idx){

const id = alumniData[idx].id;

await deleteAlumniDB(id);

location.reload();

}


/* TRACK */

window.trackAlumni = async function(idx){

const alumni = alumniData[idx];

const score = calculateScore(alumni);

const status = getStatus(score);

await updateAlumniDB(alumni.id,{

confidence:score,
status:status

});

location.reload();

}

</script>


</body>
</html>
