<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; }
.font-display { font-family: 'Playfair Display', serif; }

@keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
@keyframes slideRight { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
@keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:.4; } }

.anim-fade-up { animation: fadeUp .5s ease both; }
.anim-scale-in { animation: scaleIn .4s ease both; }
.anim-slide-right { animation: slideRight .4s ease both; }

.anim-delay-1 { animation-delay: .08s; }
.anim-delay-2 { animation-delay: .16s; }
.anim-delay-3 { animation-delay: .24s; }
.anim-delay-4 { animation-delay: .32s; }
.anim-delay-5 { animation-delay: .4s; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #bccbe7; border-radius: 3px; }

.progress-ring-circle {
transition: stroke-dashoffset 0.6s ease;
transform: rotate(-90deg);
transform-origin: 50% 50%;
}

.table-row-hover { transition: background .15s ease; }
.table-row-hover:hover { background: #f0f4fa; }

.sidebar-link { transition: all .15s ease; }
.sidebar-link:hover { background: rgba(255,255,255,.12); }
.sidebar-link.active { background: rgba(255,255,255,.18); border-left: 3px solid #fff; }

.badge-pulse { animation: pulse-dot 2s ease infinite; }

.modal-overlay {
background: rgba(10,22,40,.45);
backdrop-filter: blur(4px);
}

.custom-check { accent-color: #1e3a6e; }

</style>

</head>

<script>

function showPage(page){

document.querySelectorAll('[id^="page-"]:not(#page-login)')
.forEach(el=>el.classList.add('hidden'));

document.getElementById('page-'+page).classList.remove('hidden');

}

document.getElementById("btn-login").onclick=function(){

document.getElementById("page-login").classList.add("hidden");
document.getElementById("app-shell").classList.remove("hidden");

showPage("dashboard");

lucide.createIcons();

}

function logout(){

document.getElementById("app-shell").classList.add("hidden");
document.getElementById("page-login").classList.remove("hidden");

}

lucide.createIcons();

</script>

<script type="module">

import { getAlumni, addAlumni, deleteAlumni, updateStatus } from "./js/database.js";
import { runTracking } from "./js/tracking.js";
import { updateDashboard } from "./js/dashboard.js";

let alumniData = [];


// ===== LOAD DATA FROM FIREBASE =====

async function loadAlumni() {

  alumniData = await getAlumni();

  renderAlumniTable();

  updateDashboard(alumniData);

}

loadAlumni();


// ===== RENDER ALUMNI TABLE =====

window.renderAlumniTable = function () {

  const tbody = document.getElementById("alumni-table-body");

  if (!tbody) return;

  tbody.innerHTML = "";

  alumniData.forEach((a, i) => {

    const tr = document.createElement("tr");

    const statusColors = {
      "Identified": "bg-emerald-50 text-emerald-700",
      "Pending": "bg-amber-50 text-amber-700",
      "Not Found": "bg-red-50 text-red-600"
    };

    tr.className = "table-row-hover";

    tr.innerHTML = `
      <td class="px-5 py-3.5">${a.name}</td>
      <td class="px-5 py-3.5">${a.nim}</td>
      <td class="px-5 py-3.5">${a.program}</td>
      <td class="px-5 py-3.5">${a.year}</td>
      <td class="px-5 py-3.5">
        <span class="text-xs px-2 py-1 rounded-full ${statusColors[a.status]}">
          ${a.status}
        </span>
      </td>
      <td class="px-5 py-3.5">
        ${a.confidence}%
      </td>
      <td class="px-5 py-3.5 text-right">
        <button onclick="trackAlumni(${i})"
        class="text-blue-500 text-xs mr-2">
        Track
        </button>

        <button onclick="removeAlumni(${i})"
        class="text-red-500 text-xs">
        Delete
        </button>
      </td>
    `;

    tbody.appendChild(tr);

  });

}


// ===== ADD ALUMNI =====

window.saveAlumni = async function () {

  const name = document.getElementById("add-name").value;
  const nim = document.getElementById("add-nim").value;
  const program = document.getElementById("add-program").value;
  const year = document.getElementById("add-year").value;

  await addAlumni({
    name,
    nim,
    program,
    year,
    status: "Pending",
    confidence: 0
  });

  await loadAlumni();

}


// ===== DELETE ALUMNI =====

window.removeAlumni = async function (index) {

  const id = alumniData[index].id;

  await deleteAlumni(id);

  await loadAlumni();

}


// ===== RUN TRACKING =====

window.trackAlumni = async function (index) {

  const alumni = alumniData[index];

  const result = runTracking(alumni);

  await updateStatus(alumni.id, result.status, result.confidence);

  await loadAlumni();

}

</script>
