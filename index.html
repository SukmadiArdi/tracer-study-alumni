<!doctype html>
<html lang="en" class="h-full">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alumni Tracer Study System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
theme:{
extend:{
colors:{
navy:{
50:'#f0f4fa',
100:'#dce4f2',
200:'#bccbe7',
300:'#8da8d6',
400:'#5e82c1',
500:'#3d63aa',
600:'#1e3a6e',
700:'#162d56',
800:'#0f2041',
900:'#0a1628'
},
slate_surface:'#f7f9fc'
}
}
}
}
</script>

<style>

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'DM Sans',sans-serif;
background:#f7f9fc;
}

.sidebar-link{
transition:.15s;
}

.sidebar-link.active{
background:rgba(255,255,255,.15);
}

.table-row-hover:hover{
background:#f0f4fa;
}

</style>

</head>

<body class="h-full text-navy-800">

<!-- LOGIN PAGE -->

<div id="page-login" class="h-full flex">

<div class="w-1/2 bg-gradient-to-br from-navy-600 to-navy-900 flex flex-col items-center justify-center text-white">

<h2 class="text-3xl font-display mb-4">
Alumni Tracer Study
</h2>

<p class="text-white/70 text-sm">
Connecting graduates with their alma mater
</p>

</div>

<div class="w-1/2 flex items-center justify-center">

<div class="w-96">

<h1 class="text-3xl font-display mb-2">
Welcome back
</h1>

<p class="text-sm text-navy-400 mb-6">
Sign in to access the dashboard
</p>

<input id="login-user"
class="w-full mb-3 p-3 border rounded-lg"
placeholder="admin">

<input id="login-pass"
type="password"
class="w-full mb-4 p-3 border rounded-lg"
placeholder="password">

<button id="btn-login"
class="w-full bg-navy-600 text-white py-3 rounded-xl">

Sign In

</button>

</div>

</div>

</div>

<!-- APP -->

<div id="app-shell" class="hidden h-full">

<div class="flex h-full">

<!-- SIDEBAR -->

<aside class="w-64 bg-gradient-to-b from-navy-700 to-navy-900 text-white flex flex-col">

<div class="p-5 font-semibold">
Tracer Study
</div>

<nav class="flex-1 px-3">

<button onclick="showPage('dashboard')" class="sidebar-link active w-full text-left px-3 py-2 rounded">
Dashboard
</button>

<button onclick="showPage('alumni')" class="sidebar-link w-full text-left px-3 py-2 rounded">
Alumni Management
</button>

<button onclick="showPage('verification')" class="sidebar-link w-full text-left px-3 py-2 rounded">
Manual Verification
</button>

</nav>

<div class="p-4 border-t border-white/10">

<button onclick="logout()">
Logout
</button>

</div>

</aside>

<!-- MAIN -->

<main class="flex-1 overflow-auto">

<header class="bg-white border-b p-4">

<h2 id="page-title" class="font-semibold">
Dashboard
</h2>

</header>

<!-- DASHBOARD -->

<section id="page-dashboard" class="p-6">

<p class="text-sm text-navy-400">
Overview of alumni tracking progress
</p>

</section>

<!-- ALUMNI -->

<section id="page-alumni" class="hidden p-6">

<table class="w-full text-sm">

<thead>

<tr class="text-navy-500 text-xs uppercase">

<th class="px-4 py-2">Name</th>
<th class="px-4 py-2">NIM</th>
<th class="px-4 py-2">Program</th>
<th class="px-4 py-2">Year</th>
<th class="px-4 py-2">Status</th>
<th class="px-4 py-2">Confidence</th>

</tr>

</thead>

<tbody id="alumni-table-body"></tbody>

</table>

</section>

<!-- VERIFICATION -->

<section id="page-verification" class="hidden p-6">

<div id="verification-list"></div>

</section>

</main>

</div>

</div>

<script>

let alumniData=[];
let verificationData=[];

function showPage(page){

document.querySelectorAll("[id^='page-']").forEach(p=>{

if(p.id!=="page-login")p.classList.add("hidden")

})

document.getElementById("page-"+page).classList.remove("hidden")

}

document.getElementById("btn-login").onclick=function(){

document.getElementById("page-login").classList.add("hidden")
document.getElementById("app-shell").classList.remove("hidden")

showPage("dashboard")

}

function logout(){

document.getElementById("app-shell").classList.add("hidden")
document.getElementById("page-login").classList.remove("hidden")

}

</script>

<!-- FIREBASE INTEGRATION -->

<script type="module">

import { getAlumni } from "./js/database.js"

async function loadFirebaseData(){

const data=await getAlumni()

alumniData.length=0
verificationData.length=0

data.forEach(a=>{

alumniData.push(a)

if(a.status==="Pending"){

verificationData.push(a)

}

})

renderAlumniTable()
renderVerification()

}

window.renderAlumniTable=function(){

const tbody=document.getElementById("alumni-table-body")

tbody.innerHTML=""

alumniData.forEach(a=>{

const tr=document.createElement("tr")

tr.className="table-row-hover"

tr.innerHTML=`

<td class="px-4 py-2">${a.name}</td>
<td class="px-4 py-2">${a.nim}</td>
<td class="px-4 py-2">${a.program}</td>
<td class="px-4 py-2">${a.year}</td>
<td class="px-4 py-2">${a.status}</td>
<td class="px-4 py-2">${a.confidence}%</td>

`

tbody.appendChild(tr)

})

}

window.renderVerification=function(){

const container=document.getElementById("verification-list")

container.innerHTML=""

verificationData.forEach(a=>{

container.innerHTML+=`

<div class="bg-white p-4 border rounded-xl mb-3">

<b>${a.name}</b>

<div class="text-xs text-navy-400">

${a.program} • ${a.year}

</div>

</div>

`

})

}

loadFirebaseData()

</script>

</body>
</html>
