<script type="module">

import { loadAlumni, addAlumniDB, deleteAlumniDB, updateAlumniDB } from "./js/database.js";
import { calculateScore, getStatus } from "./js/tracking.js";

let alumniData = [];

/* LOAD DATA FROM FIREBASE */

async function init(){

alumniData = await loadAlumni();

renderAlumniTable();

}

init();


/* RENDER TABLE */

window.renderAlumniTable = function(){

const tbody = document.getElementById('alumni-table-body');

tbody.innerHTML = '';

alumniData.forEach((a,i)=>{

const statusColors = {

Identified:'bg-emerald-50 text-emerald-700',

Pending:'bg-amber-50 text-amber-700',

"Not Found":'bg-red-50 text-red-600'

};

const confColor = a.confidence >= 80 ? 'text-emerald-600'
: a.confidence >= 50 ? 'text-amber-600'
: 'text-red-500';

const confBg = a.confidence >= 80 ? 'bg-emerald-500'
: a.confidence >= 50 ? 'bg-amber-500'
: 'bg-red-400';

const tr = document.createElement('tr');

tr.innerHTML = `

<td class="px-5 py-3.5">${a.name}</td>
<td class="px-5 py-3.5">${a.nim}</td>
<td class="px-5 py-3.5">${a.program}</td>
<td class="px-5 py-3.5">${a.year}</td>

<td class="px-5 py-3.5">
<span class="text-xs px-2 py-1 rounded-full ${statusColors[a.status]}">
${a.status}
</span>
</td>

<td class="px-5 py-3.5">

<div class="flex items-center gap-2">

<div class="w-16 h-1.5 bg-navy-100 rounded-full overflow-hidden">

<div class="h-full ${confBg}" style="width:${a.confidence}%"></div>

</div>

<span class="${confColor}">${a.confidence}%</span>

</div>

</td>

<td class="px-5 py-3.5 text-right">

<button onclick="trackAlumni(${i})"
class="text-blue-500 mr-2">
Track
</button>

<button onclick="deleteAlumni(${i})"
class="text-red-500">
Delete
</button>

</td>

`;

tbody.appendChild(tr);

});

lucide.createIcons();

}


/* ADD ALUMNI */

window.saveAlumni = async function(){

const name = document.getElementById("add-name").value;

const nim = document.getElementById("add-nim").value;

const program = document.getElementById("add-program").value;

const year = document.getElementById("add-year").value;

await addAlumniDB({

name,
nim,
program,
year,
status:"Pending",
confidence:0

});

location.reload();

}


/* DELETE */

window.deleteAlumni = async function(i){

const id = alumniData[i].id;

await deleteAlumniDB(id);

location.reload();

}


/* TRACK */

window.trackAlumni = async function(i){

const alumni = alumniData[i];

const score = calculateScore(alumni);

const status = getStatus(score);

await updateAlumniDB(alumni.id,{

confidence:score,
status:status

});

location.reload();

}

</script>
